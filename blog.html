<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Eduardo Howard</title>
    <link rel="stylesheet" href="/index.css" />
    <style>
      .blog-container {
        width: 700px;
        margin: 40px auto;
        background: white;
        border: 1px solid #ccc;
        padding: 30px;
      }

      .blog-header {
        border-bottom: 1px solid #000;
        padding-bottom: 20px;
        margin-bottom: 30px;
      }

      .blog-header h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 2px;
      }

      .blog-post {
        margin-bottom: 40px;
      }

      .blog-post-header {
        margin-bottom: 15px;
      }

      .blog-post h2 {
        font-size: 20px;
        margin: 0 0 5px;
        display: inline;
      }

      .blog-post .date {
        font-size: 12px;
        color: #666;
        margin-left: 10px;
      }

      .blog-post-content {
        line-height: 1.6;
      }

      .blog-post-content p {
        margin: 0;
      }

      .blog-divider {
        border: none;
        border-top: 1px solid #000;
        margin: 30px 0;
      }

      .home_link {
        position: fixed;
        bottom: 10px;
        right: 10px;
      }

      .home_link a {
        color: rgb(0, 0, 0);
        text-decoration: none;
        margin: 0 5px;
      }
    </style>
  </head>
  <body class="body">
    <div class="blog-container">
      <div class="blog-header">
        <h1>BLOG</h1>
      </div>

      <div class="blog-post">
        <div class="blog-post-header">
          <h2>First semester</h2>
          <span class="date">March 16, 2026</span>
        </div>
        <div class="blog-post-content">
          <p>Primer video a principios de invierno.</p>
        </div>
      </div>

      <hr class="blog-divider" />

      <div class="blog-post">
        <div class="blog-post-header">
          <h2>Blog Iniciado</h2>
          <span class="date">January 1, 2026</span>
        </div>
        <div class="blog-post-content">
          <p>Sup, nuevo blog! Aca voy a ir publicando actualizaciones.</p>
        </div>
      </div>
    </div>

    <div class="home_link">
      <a href="home.html">home</a>
    </div>
  </body>
</html>
