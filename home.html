<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/index.css" />
    <link rel="icon" href="me.ico" type="image/x-icon" />
    <title>Eduardo Howard</title>
    <style>
      .body {
        color: rgb(0, 0, 0);
        font-family: Times New Roman;
        font-size: 20px;
        background-color: rgb(255, 255, 255);
        /*background-image: url('foto9.jpg');*/
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        background-attachment: fixed;
      }
      .container {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
      }

      .timer-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .subtitle {
        margin: 0;
        font-size: 1pc;
      }

      .copyright {
        position: absolute;
        bottom: 10px;
        left: 10px;
        text-shadow: 0px 0px 0px black;
      }

      .copyright a {
        color: black;
        text-decoration: none;
      }

      .footerlinks {
        position: absolute;
        bottom: 10px;
        right: 10px;
      }

      .footerlinks a {
        color: rgb(0, 0, 0);
        text-decoration: none;
        margin: 0 5px;
      }

      #reloj {
        font-size: 1pc;
        font-family: Times New Roman;
        margin-top: 20px;
        color: blue;
      }

      .carousel {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 0 auto 20px;
        overflow: hidden;
        border-radius: 10px;
      }

      .carousel-track {
        width: 100%;
        height: 100%;
      }

      .carousel-slide {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }

      .carousel-slide.active {
        display: block;
      }

      .carousel-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        font-size: 18px;
      }

      .carousel-btn.prev {
        left: 10px;
      }

      .carousel-btn.next {
        right: 10px;
      }

      .carousel-btn:hover {
        background: rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body class="body">
    <div class="container">
      <h1 class="title">Howieze</h1>
      <img src="home.gif" alt="" />
      <div class="timer-row">
        <h3 class="subtitle">Time in Argentina:</h3>
        <div id="reloj"></div>
      </div>
    </div>

    <div class="copyright">
      <a href="https://www.youtube.com/@howieze">© Howieze 2026</a>
    </div>

    <div class="footerlinks">
      <a href="about.html">about</a>
      -
      <a href="blog.html">blog</a>
      -
      <a href="gear.html">gear</a>
      -
      <a href="contact.html">contact</a>
    </div>

    <script src="script.js"></script>
  </body>
</html>
